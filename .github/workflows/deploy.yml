name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Create .env from GitHub secrets
        env:
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_RECIPIENT_EMAIL: ${{ secrets.VITE_RECIPIENT_EMAIL }}
        run: |
          missing=()
          [ -z "$VITE_EMAILJS_SERVICE_ID" ]  && missing+=(VITE_EMAILJS_SERVICE_ID) || true
          [ -z "$VITE_EMAILJS_TEMPLATE_ID" ] && missing+=(VITE_EMAILJS_TEMPLATE_ID) || true
          [ -z "$VITE_EMAILJS_PUBLIC_KEY" ]  && missing+=(VITE_EMAILJS_PUBLIC_KEY) || true
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          printf 'VITE_EMAILJS_SERVICE_ID=%s\n'  "$VITE_EMAILJS_SERVICE_ID"  >> .env
          printf 'VITE_EMAILJS_TEMPLATE_ID=%s\n' "$VITE_EMAILJS_TEMPLATE_ID" >> .env
          printf 'VITE_EMAILJS_PUBLIC_KEY=%s\n'  "$VITE_EMAILJS_PUBLIC_KEY"  >> .env
          [ -n "$VITE_RECIPIENT_EMAIL" ] && printf 'VITE_RECIPIENT_EMAIL=%s\n' "$VITE_RECIPIENT_EMAIL" >> .env || true

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
